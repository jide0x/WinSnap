name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: [ '3.10', '3.12' ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Compile sources
        run: |
          python -m compileall winsnap

      - name: Run unit tests (unittest)
        run: |
          python -m unittest discover -s tests -p "test*.py"

      - name: CLI smoke
        run: |
          python -m winsnap --version
          python -m winsnap help

      - name: Build wheel
        run: |
          python -m build

      - name: Wheel install smoke (venv)
        shell: powershell
        run: |
          python -m venv .venv-ci
          .\.venv-ci\Scripts\Activate.ps1
          python -m pip install --upgrade pip
          pip install (Get-ChildItem dist\*.whl | Select-Object -First 1).FullName
          winsnap --version
          winsnap help
